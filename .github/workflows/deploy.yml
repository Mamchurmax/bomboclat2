name: Deploy to EC2
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          echo "$EC2_KEY" > key.pem
          chmod 600 key.pem
          ssh -i key.pem \
            -o StrictHostKeyChecking=no \
            $EC2_USER@$EC2_HOST << 'ENDSSH'
            cd ~/bomboclat2
            git pull origin main
            docker build -t bomboclat2 .
            docker stop bomboclat2 || true
            docker rm bomboclat2 || true
            docker run -d --name bomboclat2 --restart always -p 5000:5000 bomboclat2
          ENDSSH
          rm -f key.pem

name: Deploy to EC2
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug key
        run: |
          echo "${{ secrets.EC2_KEY }}" | cat -A | head -5
      - name: Deploy
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -i key.pem \
            -o StrictHostKeyChecking=no \
            -o LogLevel=DEBUG \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/bomboclat2
            git pull origin main
            docker build -t bomboclat2 .
            docker stop bomboclat2 || true
            docker rm bomboclat2 || true
            docker run -d --name bomboclat2 --restart always -p 5000:5000 bomboclat2
          EOF
          rm -f key.pem